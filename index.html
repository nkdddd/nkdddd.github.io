        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
        .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 16px), 8px); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-10px) rotate(-2deg); } 40% { transform: translateX(10px) rotate(2deg); } 60% { transform: translateX(-10px) rotate(-2deg); } 80% { transform: translateX(10px) rotate(2deg); } }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fly-to-blank { 0% { transform: scale(1) translateY(0); opacity: 1; } 50% { transform: scale(1.5) translateY(-50px); opacity: 0.8; } 100% { transform: scale(0.5) translate(0, -150px); opacity: 0; } }
        .animate-fly { animation: fly-to-blank 0.6s ease-in-out forwards; }
        @keyframes flash-red { 0% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); } 20% { box-shadow: inset 0 0 0 30px rgba(239, 68, 68, 0.6); } 100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); } }
        .animate-flash { animation: flash-red 0.5s ease-out; }
        @keyframes pack-tremble { 0%, 100% { transform: rotate(0deg) scale(1); filter: brightness(1); } 25% { transform: rotate(-5deg) scale(1.05); filter: brightness(1.2); } 50% { transform: rotate(5deg) scale(1.05); } 75% { transform: rotate(-5deg) scale(1.05); } }
        .animate-pack-open { animation: pack-tremble 0.2s infinite ease-in-out; }
        @keyframes mythic-glow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        
        details > summary { list-style: none; outline: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* 리스트용 작은 카드 등급 CSS */
        .grade-mythic { background: linear-gradient(135deg, #e0e7ff, #f3e8ff, #fae8ff); border: 4px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.8); animation: mythic-glow 3s infinite linear; }
        .grade-legend { background: linear-gradient(135deg, #fee2e2, #fecaca, #fca5a5); border: 4px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        .grade-super { background: linear-gradient(135deg, #fffbeb, #fef3c7, #fde68a); border: 4px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .grade-rare { background: linear-gradient(135deg, #f8fafc, #f1f5f9, #e2e8f0); border: 4px solid #cbd5e1; box-shadow: 0 0 10px rgba(203, 213, 225, 0.5); }
        .grade-normal { background: #ffffff; border: 4px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        /* 팝업용 상세 트레이딩 카드 CSS (1:1 비율 복구 및 2/3 사이즈 전체 압축) */
        .dex-detail-card { background: #ffffff; border: 2px solid var(--type); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 20px rgba(35,32,43,.15); display: flex; flex-direction: column; width: 100%; text-align: left; }
        .dex-detail-card .card-top { display: flex; align-items: center; justify-content: space-between; background: var(--type); padding: 6px 10px; }
        .dex-detail-card .badge { width: 28px; height: 28px; border-radius: 50%; background: #fff; color: var(--type); display: grid; place-items: center; font-family: "Arial Black", sans-serif; font-size: 16px; line-height: 1; font-weight: 900; }
        .dex-detail-card .no { color: #fff; font-weight: 800; font-size: 10px; letter-spacing: .5px; opacity: .95; }
        
        .dex-detail-card .hero { position: relative; width: 100%; aspect-ratio: 1/1; background: color-mix(in srgb, var(--type) 14%, #fff); display: grid; place-items: center; overflow: hidden; }

        .dex-detail-card .hero-img { position: relative; z-index: 1; max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,.15)); }
        
        .dex-detail-card .body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 6px; }
        .dex-detail-card .names { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; flex-wrap: wrap; }
        .dex-detail-card .names h2 { margin: 0; font-size: 16px; font-weight: 900; color:#23202b; line-height: 1.2; display: flex; align-items: center; gap: 4px; }
        .dex-detail-card .names h2 .ko { font-size: 11px; font-weight: 700; color: #6b6577; }
        .dex-detail-card .learn { margin: 0; font-size: 9px; color: #fff; background: var(--type); padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
        .dex-detail-card .learn b { font-family: "Arial Black", sans-serif; }
        .dex-detail-card .title-line { margin: 0; font-size: 11px; font-weight: 800; color: var(--type); }
        .dex-detail-card .types { display: flex; gap: 4px; }
        .dex-detail-card .type-badge { color: #fff; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 6px; }
        .dex-detail-card .desc { margin: 0; font-size: 11px; line-height: 1.4; color: #403b49; font-weight:600;}
        
        .dex-detail-card .evo { display: flex; align-items: center; gap: 4px; margin-top: 2px; background: color-mix(in srgb, var(--type) 8%, #fff); border-radius: 8px; padding: 6px; justify-content: center; }
        .dex-detail-card .evo.single { padding: 8px; }
        .dex-detail-card .evo-step { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; position: relative; }
        .dex-detail-card .evo-img { width: 30px; height: 30px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,.15)); position: relative; z-index: 1; }
        .dex-detail-card .evo-img.missing { opacity: 0; }
        .dex-detail-card .evo-ghost { position: absolute; inset: 0 0 10px 0; display: grid; place-items: center; font-family: "Arial Black", sans-serif; font-size: 24px; color: var(--type); opacity: .15; z-index: 0; }
        .dex-detail-card .evo-step figcaption { font-size: 8px; font-weight: 800; color: var(--type); letter-spacing: -.5px; opacity: .9; margin-top: -2px; }
        .dex-detail-card .evo-arrow { width: 8px; height: 8px; background: var(--type); opacity: .3; clip-path: polygon(0 0, 50% 50%, 0 100%, 100% 50%); }
        .dex-detail-card .solo-tag { font-size: 10px; font-weight: 800; color: var(--type); letter-spacing: 1px; }

        .booster-pack-bottom { position: absolute; bottom: 0; width: 100%; height: 12px; background: repeating-linear-gradient(90deg, #d1d5db, #d1d5db 4px, #9ca3af 4px, #9ca3af 8px); }
        .booster-circle { width: 50px; height: 50px; background: white; border-radius: 50%; border: 4px solid black; position: absolute; bottom: 20px; overflow: hidden; }

        window.confirmCustomPrompt = async function() {
            const p = window.state.customPrompt;
            let inputValue = null;

            if (p.hasInput) {
                const inputEl = document.getElementById('prompt-input');
                inputValue = parseInt(inputEl.value);
                if (isNaN(inputValue) || inputValue <= 0) return window.showToast("올바른 금액을 입력하세요.");
            }

            try {
                if (p.actionType === 'SYSTEM_SELL') {
                    const card = window.state.inventory.find(c => c.id === p.payload);
                    if(!card) return;
                    const prices = { 'NORMAL': 10, 'RARE': 50, 'SUPER': 200, 'LEGEND': 1000, 'MYTHIC': 5000 };
                    const price = Math.floor((prices[card.grade] || 10) / 2);
                    window.state.inventory = window.state.inventory.filter(c => c.id !== card.id);
                    window.state.coins += price;
                    window.state.actionCard = null; 
                    window.saveData();
                    window.showToast(`상점에 팔아 ${price}코인을 얻었습니다! 🪙`);
                } 
                else if (p.actionType === 'MARKET_SELL') {
                    const card = window.state.inventory.find(c => c.id === p.payload);
                    if(!card) return;
                    window.state.inventory = window.state.inventory.filter(c => c.id !== card.id);
                    window.state.actionCard = null; 
                    window.saveData();
                    if(window.db) {
                        await window.db.collection("market").add({
                            sellerUid: window.currentUser.uid, sellerEmail: window.currentUser.email,
                            card: card, price: inputValue, timestamp: Date.now()
                        });
                        window.showToast("친구 거래소에 등록 완료!");
                        window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'BUY_MARKET') {
                    const item = window.state.marketList.find(m => m.id === p.payload);
                    if(!item) return;
                    window.state.coins -= item.price;
                    const boughtCard = { ...item.card, id: Date.now().toString() };
                    window.state.inventory.push(boughtCard);
                    window.saveData();
                    if(window.db) {
                        window.db.collection("users").doc(item.sellerUid).update({
                            coins: firebase.firestore.FieldValue.increment(item.price)
                        }).catch(e => console.log(e));
                        await window.db.collection("market").doc(item.id).delete();
                        window.showToast("구매 성공! 도감에 추가되었습니다.");
                        window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'ADD_FRIEND') {
                    const targetUid = p.payload;
                    if(window.db) {
                        await window.db.collection("users").doc(targetUid).update({
                            friendRequests: firebase.firestore.FieldValue.arrayUnion({ uid: window.currentUser.uid, email: window.currentUser.email })
                        });
                        window.showToast("친구 요청을 성공적으로 보냈습니다!");
                    }
                } 
                else if (p.actionType === 'ACCEPT_FRIEND') {
                    const requesterUid = p.payload;
                    window.state.friends.push(requesterUid);
                    window.state.friendRequests = window.state.friendRequests.filter(req => req.uid !== requesterUid);
                    window.saveData();
                    if(window.db) {
                        await window.db.collection("users").doc(requesterUid).update({ friends: firebase.firestore.FieldValue.arrayUnion(window.currentUser.uid) });
                        window.showToast("친구가 되었습니다!"); window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'REJECT_FRIEND') {
                    const requesterUid = p.payload;
                    window.state.friendRequests = window.state.friendRequests.filter(req => req.uid !== requesterUid);
                    window.saveData(); window.showToast("친구 요청을 거절했습니다.");
                }
            } catch(e) { console.error(e); window.showToast("오류가 발생했습니다."); }
            window.closeCustomPrompt();
        };

        window.speak = function(text, lang = 'en-US') {
            if (!text) return;
            try {
                // 구글 클라우드 번역기 API (띄어쓰기 쪼개기 삭제 완료)
                const url = `https://translate.googleapis.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=gtx`;
                const audio = new Audio(url);
                audio.play().catch(e => { window.fallbackSpeak(text, lang); });
            } catch (e) { window.fallbackSpeak(text, lang); }
        };

        window.fallbackSpeak = function(text, lang) {
            if (!window.speechSynthesis) return; 
            window.speechSynthesis.cancel();
            
            let speakText = text;
            if (lang === 'en-US' && speakText.length === 1 && /[a-zA-Z]/.test(speakText)) speakText = speakText.toLowerCase() + ".";
            const utterance = new SpeechSynthesisUtterance(speakText);
            utterance.lang = lang; utterance.rate = 0.9;

            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                let targetVoice = null;
                if (lang.startsWith('en')) {
                    const premiumVoices = ["Google US English", "Samantha", "Alex", "Fred", "Victoria", "Daniel", "Karen", "Microsoft Aria"];
                    targetVoice = voices.find(v => premiumVoices.some(name => v.name.includes(name)) && v.lang.startsWith('en'));
                    if (!targetVoice) targetVoice = voices.find(v => v.lang === 'en-US'); 
                    if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith('en'));
                } else if (lang.startsWith('ko')) {

        window.handleShake = function(e) {
            if(!window.state.isClickingMode) return;
            const now = Date.now();
            if (now - window.lastShakeTime < 100) return; 

            const acc = e.accelerationIncludingGravity;
            if(!acc) return;
            
            if(window.lastX !== null) {
                const delta = Math.abs(acc.x - window.lastX) + Math.abs(acc.y - window.lastY) + Math.abs(acc.z - window.lastZ);
                if(delta > 15) { 
                    window.doClick(); // 흔들릴 때마다 클릭수 증가
                    window.lastShakeTime = now;
                }
            }
            window.lastX = acc.x; window.lastY = acc.y; window.lastZ = acc.z;
        };

        window.getNewQuiz = function() {
            const mode = window.state.trainingMode || 'alphabet';
            if (mode === 'alphabet') {
                const qType = window.state.trainingSubMode || 'match';
                const target = ALPHABET_DB[Math.floor(Math.random() * ALPHABET_DB.length)];
                let options = [], ans = '';
                if (qType === 'match') {
                    const isUpperToLower = Math.random() > 0.5;
                    ans = isUpperToLower ? target.l : target.u;
                    window.state.currentQuiz = { isAlphabet: true, qType: 'match', display: isUpperToLower ? target.u : target.l, sub: isUpperToLower ? '소문자 짝꿍은?' : '대문자 짝꿍은?', ans: ans, speakText: target.l, speakLang: 'en-US' };
                    options = ALPHABET_DB.map(x => isUpperToLower ? x.l : x.u);
                } else if (qType === 'name') {
                    ans = target.u; window.state.currentQuiz = { isAlphabet: true, qType: 'name', display: `🔈 ${target.n}`, sub: '이름을 가진 알파벳은?', ans: ans, speakText: target.l, speakLang: 'en-US' };
                    options = ALPHABET_DB.map(x => x.u);
                } else if (qType === 'sound') {
                    ans = target.l; window.state.currentQuiz = { isAlphabet: true, qType: 'sound', display: `🔈 ${target.s}`, sub: '소리를 내는 알파벳은?', ans: ans, speakText: target.ps, speakLang: 'en-US' };
                    options = ALPHABET_DB.map(x => x.l);
                }
                options = options.filter(x => x !== ans).sort(() => 0.5 - Math.random()).slice(0, 4); options.push(ans);
                window.state.currentQuiz.options = options.sort(() => 0.5 - Math.random());
            } else {
                let wordObj, targetAns, blankIdx, opts = [];
                if (mode === 'vowel') {
                    const vowelWords = WORDS_DB.filter(w => ['a','e','i','o','u'].includes(w.ans) && w.parts.includes(w.ans));
                    wordObj = vowelWords[Math.floor(Math.random() * vowelWords.length)];
                    targetAns = wordObj.ans; blankIdx = wordObj.parts.indexOf(targetAns); opts = ['a', 'e', 'i', 'o', 'u'];
                } else {
                    wordObj = WORDS_DB[Math.floor(Math.random() * WORDS_DB.length)];
                    blankIdx = Math.floor(Math.random() * wordObj.parts.length);
                    targetAns = wordObj.parts[blankIdx]; opts = [targetAns];
                    const isVowel = ['a','e','i','o','u'].includes(targetAns);
                    const pool = isVowel ? ['a','e','i','o','u'] : ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','x','y','z'];
                    while(opts.length < 5) { const rnd = pool[Math.floor(Math.random() * pool.length)]; if(!opts.includes(rnd)) opts.push(rnd); }
                }
                opts.sort(() => 0.5 - Math.random());
                window.state.currentQuiz = { ...wordObj, isAlphabet: false, ans: targetAns, blankIndex: blankIdx, options: opts };
            }
        };

        // 🟢 제단 시작 로직 - 모바일 흔들기(Shake) 권한 요청 🟢
        window.startClickEvent = function() {
            if(window.state.altarSelection.length === 0 || window.state.isProcessing) return;
            const firstCardId = window.state.altarSelection[0];
            const baseCard = window.state.inventory.find(c => c.id === firstCardId);
            const reqCards = baseCard.grade === 'MYTHIC' ? 5 : 2;

            if(window.state.altarSelection.length !== reqCards) return window.showToast(`카드를 ${reqCards}장 선택해주세요!`);
            
            window.initAudio();

            // iOS 기기 등에서 흔들기 센서 권한 허용 (버튼을 클릭했을 때만 작동함)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => {
                    if (response === 'granted') window.addEventListener('devicemotion', window.handleShake);
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', window.handleShake);
            }

            window.state.isClickingMode = true; window.state.clickCount = 0; window.state.clickTimeLeft = 3; window.render();
            window.state.clickTimer = setInterval(() => {
                window.state.clickTimeLeft -= 1;
                const timeEl = document.getElementById('click-time-text');
                if (timeEl) timeEl.innerText = window.state.clickTimeLeft + '초';
                if(window.state.clickTimeLeft <= 0) { 
                    clearInterval(window.state.clickTimer); 
                    window.state.isClickingMode = false; 
                    window.removeEventListener('devicemotion', window.handleShake);
                    window.tryEvolve(); 
                }
            }, 1000);
        };

            if(!window.state.isClickingMode) return;
            window.state.clickCount += 1;
            
            // 터치/흔들 때마다 미세 진동
            if(navigator.vibrate) navigator.vibrate(20);

            const countEl = document.getElementById('click-count-text'); if (countEl) countEl.innerText = window.state.clickCount;
            const cardId = window.state.altarSelection[0];
            const baseCard = window.state.inventory.find(c => c.id === cardId);
            const targetClicks = 11; const remaining = Math.max(targetClicks - window.state.clickCount, 0); const remainEl = document.getElementById('click-remain-text');
            if (remainEl) {
                if (baseCard && baseCard.grade === 'MYTHIC') remainEl.innerHTML = `<div class="text-red-400 font-bold text-xs mt-1">광클하여 확률을 높이세요!<br>(실패 시 3장 파괴)</div>`;

        // 🟢 제단 결과 사운드 연동 🟢
        window.tryEvolve = async function() {
            window.state.isProcessing = true; window.render();
            const cardId = window.state.altarSelection[0]; const baseCard = window.state.inventory.find(c => c.id === cardId); const grade = baseCard.grade;
            let baseRate = 0.60; let nextGrade = 'SUPER'; let dbTarget = ALPAMON_DB.MID;
            if (grade === 'SUPER') { baseRate = 0.40; nextGrade = 'LEGEND'; dbTarget = ALPAMON_DB.FINAL; }
            if (grade === 'LEGEND') { baseRate = 0.30; nextGrade = 'MYTHIC'; dbTarget = ALPAMON_DB.GOD.filter(c => c.w !== 'Omegamon'); }
            if (grade === 'MYTHIC') { baseRate = 0.10; nextGrade = 'MYTHIC'; dbTarget = [ALPAMON_DB.GOD.find(c => c.w === 'Omegamon')]; }

            const targetClicks = 11; const isProtected = grade !== 'MYTHIC' && window.state.clickCount >= targetClicks;
            let addedRate = window.state.clickCount * 0.015;
            if (grade === 'MYTHIC') addedRate = window.state.clickCount * 0.005; 
            const finalRate = Math.min(baseRate + addedRate, 1.0);

            try {
                if(Math.random() < finalRate) { 
                    window.state.inventory = window.state.inventory.filter(c => !window.state.altarSelection.includes(c.id)); window.state.altarSelection = [];
                    const targetData = dbTarget[Math.floor(Math.random() * dbTarget.length)];
                    const newCard = { id: Date.now().toString(), grade: nextGrade, w: targetData.w, kr: targetData.kr, emoji: targetData.emoji, imgUrl: CLOUD_URL + targetData.id };
                    window.state.revealedCard = newCard; window.state.packOpening = true; 
                    window.playTada(); // 진화 성공 팡파르!
                    window.showToast(`✨ 합성 대성공! (확률 ${Math.floor(finalRate*100)}% 적용)`); window.speak(targetData.w);
                    window.state.isProcessing = false; window.state.clickCount = 0; window.saveData(); window.render();
                } else {
                    if (grade === 'MYTHIC') {
                        let destroyedCards = [...window.state.altarSelection].sort(() => 0.5 - Math.random()).slice(0, 3);
                        window.state.inventory = window.state.inventory.filter(c => !destroyedCards.includes(c.id));
                        window.state.altarSelection = []; window.state.isFailing = true; window.render();
                        window.playFail();
                        setTimeout(() => { window.state.isFailing = false; window.showToast("💥 합성 실패... 신급 카드 3장이 파괴되었습니다."); window.state.isProcessing = false; window.state.clickCount = 0; window.saveData(); window.render(); }, 2500);
                    } else if (isProtected) {
                        window.state.altarSelection = []; window.state.isFailingProtected = true; window.render();
                        window.playFail();
                        setTimeout(() => { window.state.isFailingProtected = false; window.showToast("휴~ 🛡️ 터치 보호막 덕분에 카드를 지켰어요!"); window.state.isProcessing = false; window.state.clickCount = 0; window.saveData(); window.render(); }, 2500);
                    } else {
                        window.state.inventory = window.state.inventory.filter(c => !window.state.altarSelection.includes(c.id)); window.state.altarSelection = []; window.state.isFailing = true; window.render();
                        window.playFail();
                        setTimeout(() => { window.state.isFailing = false; window.showToast("💥 합성 실패... 카드가 모두 사라졌습니다."); window.state.isProcessing = false; window.state.clickCount = 0; window.saveData(); window.render(); }, 2000);
                    }
                }
            } catch(e) { window.state.isProcessing = false; window.render(); }
        };

            app.innerHTML = `

                ${toastHtml}

                ${customPromptHtml}

                    ${contentHtml}

                <!-- 🟢 플로팅 유튜브 배너 🟢 -->

                authDomain: "phonicsmonster-2d495.firebaseapp.com",
                projectId: "phonicsmonster-2d495",
                storageBucket: "phonicsmonster-2d495.firebasestorage.app",
                messagingSenderId: "961679319312",
                appId: "1:961679319312:web:8eb58f35e963585bab8595",
                measurementId: "G-RFDMSR7G82"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            window.auth = firebase.auth();
            window.db = firebase.firestore();

            window.handleAuth = async function(isLogin) {
                const email = document.getElementById('email').value; const password = document.getElementById('password').value;
                if(!email || !password) return window.showToast('이메일과 비밀번호를 모두 입력해주세요.');
                if(password.length < 6) return window.showToast('비밀번호는 6자리 이상이어야 합니다.');
                
                window.showToast("서버와 통신 중...");
                try {
                    if (isLogin) await window.auth.signInWithEmailAndPassword(email, password);
                    else { await window.auth.createUserWithEmailAndPassword(email, password); window.showToast('가입 환영! 시작합니다. 🪙'); }
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') window.showToast('이미 가입된 이메일입니다.');
                    else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') window.showToast('이메일이나 비밀번호가 틀렸습니다.');
                    else window.showToast('오류 발생: 다시 시도해주세요.');
                }
            };

            window.logout = async function() { 
                await window.auth.signOut(); 
                window.isGuestMode = false; window.currentUser = null; window.render(); window.showToast('로그아웃 되었습니다.'); 
            };

            window.auth.onAuthStateChanged(async (user) => {
                if (window.isGuestMode) return; 
                window.isAuthReady = true;
                
                if (user) {
                    window.currentUser = user;
                    try {
                        if(window.loadSocialData) window.loadSocialData();

                        if(window.userUnsubscribe) window.userUnsubscribe();
                        window.userUnsubscribe = window.db.collection("users").doc(user.uid).onSnapshot((docSnap) => {
                            if (docSnap.exists) {
                                const data = docSnap.data();
                                window.state.coins = data.coins !== undefined ? data.coins : 200;
                                window.state.inventory = data.inventory || [];
                                window.state.friends = data.friends || [];
                                window.state.friendRequests = data.friendRequests || [];
                            } else {
                                const savedData = localStorage.getItem('phonicsAppState');
                                if (savedData) {
                                    try {
                                        const localData = JSON.parse(savedData);
                                        window.state.coins = localData.coins !== undefined ? localData.coins : 200;
                                        window.state.inventory = localData.inventory || [];
                                        window.state.friends = localData.friends || [];
                                        window.state.friendRequests = localData.friendRequests || [];
                                    } catch(e) {}
                                } else {
                                    window.state.coins = 200; window.state.inventory = []; window.state.friends = []; window.state.friendRequests = [];
                                }
                                window.saveData(); 
                            }
                            if (!window.state.isProcessing && !window.state.isClickingMode && !window.state.packOpening) { window.render(); }
                            if (!window.state.initialLoadDone) { window.state.initialLoadDone = true; window.changeTab('learning'); }
                        }, (error) => {
                            console.error(error); if(error.code === 'permission-denied') window.showToast("Firebase 권한을 허용해주세요.");
                        });
                    } catch(error) { console.error("Firestore 오류:", error); window.currentUser = null; window.render(); }
                } else {
                    window.currentUser = null;
                    if(window.userUnsubscribe) { window.userUnsubscribe(); window.userUnsubscribe = null; }
                    window.render(); 
                }
            });

        } catch(error) {
            window.isAuthReady = true;
            if (document.readyState === 'complete' || document.readyState === 'interactive') window.render();
            else document.addEventListener('DOMContentLoaded', window.render);
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') window.render();
        else document.addEventListener('DOMContentLoaded', window.render);
