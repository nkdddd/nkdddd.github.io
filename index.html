        window.openCustomPrompt = function(message, hasInput, actionType, payload) {

            window.state.customPrompt = null;

        window.confirmCustomPrompt = async function() {
            const p = window.state.customPrompt;
            let inputValue = null;

            if (p.hasInput) {
                const inputEl = document.getElementById('prompt-input');
                inputValue = parseInt(inputEl.value);
                if (isNaN(inputValue) || inputValue <= 0) return window.showToast("올바른 금액을 입력하세요.");
            }

            try {
                if (p.actionType === 'SYSTEM_SELL') {
                    const card = window.state.inventory.find(c => c.id === p.payload);
                    if(!card) return;
                    const prices = { 'NORMAL': 10, 'RARE': 25, 'SUPER': 100, 'LEGEND': 500, 'MYTHIC': 2000 };
                    const price = prices[card.grade] || 10;
                    window.state.inventory = window.state.inventory.filter(c => c.id !== card.id);
                    window.state.coins += price;
                    window.saveData();
                    window.showToast(`상점에 팔아 ${price}코인을 얻었습니다! 🪙`);
                } 
                else if (p.actionType === 'MARKET_SELL') {
                    const card = window.state.inventory.find(c => c.id === p.payload);
                    if(!card) return;
                    window.state.inventory = window.state.inventory.filter(c => c.id !== card.id);
                    window.saveData();
                    
                    if(db) {
                        await db.collection("market").add({
                            sellerUid: window.currentUser.uid, sellerEmail: window.currentUser.email,
                            card: card, price: inputValue, timestamp: Date.now()
                        });
                        window.showToast("친구 거래소에 등록 완료!");
                        window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'BUY_MARKET') {
                    const item = window.state.marketList.find(m => m.id === p.payload);
                    if(!item) return;
                    window.state.coins -= item.price;
                    const boughtCard = { ...item.card, id: Date.now().toString() };
                    window.state.inventory.push(boughtCard);
                    window.saveData();

                    if(db) {
                        db.collection("users").doc(item.sellerUid).update({
                            coins: firebase.firestore.FieldValue.increment(item.price)
                        }).catch(e => console.log(e));
                        await db.collection("market").doc(item.id).delete();
                        window.showToast("구매 성공! 도감에 추가되었습니다.");
                        window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'ADD_FRIEND') {
                    const targetUid = p.payload;
                    if(db) {
                        await db.collection("users").doc(targetUid).update({
                            friendRequests: firebase.firestore.FieldValue.arrayUnion({
                                uid: window.currentUser.uid, email: window.currentUser.email
                            })
                        });
                        window.showToast("친구 요청을 성공적으로 보냈습니다!");
                    }
                } 
                else if (p.actionType === 'ACCEPT_FRIEND') {
                    const requesterUid = p.payload;
                    window.state.friends.push(requesterUid);
                    window.state.friendRequests = window.state.friendRequests.filter(req => req.uid !== requesterUid);
                    window.saveData();

                    if(db) {
                        await db.collection("users").doc(requesterUid).update({
                            friends: firebase.firestore.FieldValue.arrayUnion(window.currentUser.uid)
                        });
                        window.showToast("친구가 되었습니다!");
                        window.loadSocialData();
                    }
                } 
                else if (p.actionType === 'REJECT_FRIEND') {
                    const requesterUid = p.payload;
                    window.state.friendRequests = window.state.friendRequests.filter(req => req.uid !== requesterUid);
                    window.saveData();
                    window.showToast("친구 요청을 거절했습니다.");
                }
            } catch(e) { 
                console.error(e); 
                if(e.code === 'permission-denied') window.showToast("파이어베이스 권한 부족! Rules를 수정해주세요.");
                else window.showToast("오류가 발생했습니다."); 
            }

            window.closeCustomPrompt();
        };

        window.speak = function(text, lang = 'en-US') {
            if (!window.speechSynthesis) return; window.speechSynthesis.cancel();
            let speakText = text;
            if (lang === 'en-US' && speakText.length === 1 && /[a-zA-Z]/.test(speakText)) speakText = speakText.toLowerCase() + ".";
            const utterance = new SpeechSynthesisUtterance(speakText);
            utterance.lang = lang; utterance.rate = 0.85;

            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                let targetVoice = voices.find(v => v.lang === lang || v.lang === lang.replace('-', '_'));
                if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith(lang.substring(0, 2)));
                if (targetVoice) utterance.voice = targetVoice;
            }
            window.speechSynthesis.speak(utterance);
        };

        window.getNewQuiz = function() {
            const mode = window.state.trainingMode || 'alphabet';
            
            if (mode === 'alphabet') {
                const qType = window.state.trainingSubMode || 'match';
                const target = ALPHABET_DB[Math.floor(Math.random() * ALPHABET_DB.length)];
                let options = [], ans = '';

                if (qType === 'match') {
                    const isUpperToLower = Math.random() > 0.5;
                    ans = isUpperToLower ? target.l : target.u;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'match',
                        display: isUpperToLower ? target.u : target.l,
                        sub: isUpperToLower ? '소문자 짝꿍은?' : '대문자 짝꿍은?',
                        ans: ans, speakText: target.l, speakLang: 'en-US'
                    };
                    options = ALPHABET_DB.map(x => isUpperToLower ? x.l : x.u);
                } else if (qType === 'name') {
                    ans = target.u;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'name', display: `🔈 ${target.n}`, sub: '이름을 가진 알파벳은?',
                        ans: ans, speakText: target.l, speakLang: 'en-US'
                    };
                    options = ALPHABET_DB.map(x => x.u);
                } else if (qType === 'sound') {
                    ans = target.l;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'sound', display: `🔈 ${target.s}`, sub: '소리를 내는 알파벳은?',
                        ans: ans, speakText: target.s, speakLang: 'ko-KR'
                    };
                    options = ALPHABET_DB.map(x => x.l);
                }
                options = options.filter(x => x !== ans).sort(() => 0.5 - Math.random()).slice(0, 4);
                options.push(ans);
                window.state.currentQuiz.options = options.sort(() => 0.5 - Math.random());
            } 
            else {
                let wordObj, targetAns, blankIdx, opts = [];
                if (mode === 'vowel') {
                    const vowelWords = WORDS_DB.filter(w => ['a','e','i','o','u'].includes(w.ans) && w.parts.includes(w.ans));
                    wordObj = vowelWords[Math.floor(Math.random() * vowelWords.length)];
                    targetAns = wordObj.ans; blankIdx = wordObj.parts.indexOf(targetAns);
                    opts = ['a', 'e', 'i', 'o', 'u'];
                } else {
                    wordObj = WORDS_DB[Math.floor(Math.random() * WORDS_DB.length)];
                    blankIdx = Math.floor(Math.random() * wordObj.parts.length);
                    targetAns = wordObj.parts[blankIdx];
                    opts = [targetAns];
                    const isVowel = ['a','e','i','o','u'].includes(targetAns);
                    const pool = isVowel ? ['a','e','i','o','u'] : ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','x','y','z'];
                    while(opts.length < 5) {
                        const rnd = pool[Math.floor(Math.random() * pool.length)];
                        if(!opts.includes(rnd)) opts.push(rnd);
                    }
                }
                opts.sort(() => 0.5 - Math.random());
                window.state.currentQuiz = { ...wordObj, isAlphabet: false, ans: targetAns, blankIndex: blankIdx, options: opts };
            }
        };

        window.checkAnswer = function(selected) {
            if(window.state.isAnswering) return;
            window.state.isAnswering = true;
            const q = window.state.currentQuiz;
            const isCorrect = selected === q.ans;
            const mainContent = document.getElementById('main-content'); 

            if(isCorrect) {
                window.state.coins += 20; window.saveData(); 
                if(q.isAlphabet) window.speak(q.ans.toLowerCase(), 'en-US'); else window.speak(q.w, 'en-US');
                window.state.animatingCorrect = selected; window.render();
                setTimeout(() => {
                    window.showToast("🎉 정답! +20 코인"); window.state.animatingCorrect = null;
                    window.state.isAnswering = false; window.getNewQuiz(); window.render();
                }, 700);
            } else {
                window.state.coins = Math.max(0, window.state.coins - 10); window.saveData(); 
                if (q.isAlphabet) window.speak(selected.toLowerCase(), 'en-US');
                else {
                    let soundKr = selected;
                    if (VOWEL_DB[selected]) soundKr = VOWEL_DB[selected].sound;
                    else { const found = CONSONANT_DB.locations.flatMap(l=>l.items).find(c => c.id === selected); if(found) soundKr = found.kr; }
                    window.speak(soundKr, 'ko-KR');
                }

                if(mainContent) mainContent.classList.add('animate-shake', 'animate-flash');
                const btn = document.getElementById(`opt-${selected}`);
                if(btn) btn.classList.replace('bg-blue-500', 'bg-red-500');
                window.showToast("앗! -10 코인");

                setTimeout(() => {
                    if(mainContent) mainContent.classList.remove('animate-shake', 'animate-flash');
                    if(btn) btn.classList.replace('bg-red-500', 'bg-blue-500');
                    window.state.isAnswering = false; window.render();
                }, 500);
            }
        };

        window.doClick = function() {
            if(!window.state.isClickingMode) return;
            window.state.clickCount += 1;
            
            const countEl = document.getElementById('click-count-text');
            if (countEl) countEl.innerText = window.state.clickCount;
            
            const targetClicks = 11;
            const remaining = Math.max(targetClicks - window.state.clickCount, 0);
            const remainEl = document.getElementById('click-remain-text');
            if (remainEl) {
                if (remaining === 0) remainEl.innerHTML = `<div class="text-green-400 font-black text-sm animate-pulse">🛡️ 카드 파괴 방지 100% 활성화!</div>`;

        window.tryEvolve = async function() {
            window.state.isProcessing = true; window.render();
            const cardId = window.state.altarSelection[0];
            const baseCard = window.state.inventory.find(c => c.id === cardId);
            const grade = baseCard.grade;

            window.state.inventory = window.state.inventory.filter(c => !window.state.altarSelection.includes(c.id));
            window.state.altarSelection = [];
            
            let baseRate = 0.60; let nextGrade = 'SUPER'; let pokeIdList = NORMAL_POKE_IDS;
            if (grade === 'SUPER') { baseRate = 0.40; nextGrade = 'LEGEND'; pokeIdList = LEGEND_IDS; }
            if (grade === 'LEGEND') { baseRate = 0.30; nextGrade = 'MYTHIC'; pokeIdList = MYTHIC_IDS; }

            const targetClicks = 11;
            const isProtected = window.state.clickCount >= targetClicks;
            const addedRate = window.state.clickCount * 0.015;
            const finalRate = Math.min(baseRate + addedRate, 1.0);

            try {
                if(Math.random() < finalRate) { 
                    const randomId = pokeIdList[Math.floor(Math.random() * pokeIdList.length)];
                    const poke = await fetchPokemon(randomId);
                    const newCard = { id: Date.now().toString(), grade: nextGrade, ...poke };
                    
                    window.state.revealedCard = newCard;
                    window.state.packOpening = true; 
                    window.showToast(`✨ 합성 대성공! (확률 ${Math.floor(finalRate*100)}% 적용)`);
                    window.speak(poke.w);
                    
                    window.state.isProcessing = false; window.state.clickCount = 0; 
                    window.saveData(); window.render();
                } else {
                    if (isProtected) {
                        window.state.isFailingProtected = true; window.render();
                        setTimeout(() => {
                            window.state.isFailingProtected = false; window.showToast("휴~ 🛡️ 터치 보호막 덕분에 카드를 지켰어요!");
                            window.state.isProcessing = false; window.state.clickCount = 0;
                            window.saveData(); window.render();
                        }, 2500);
                    } else {
                        window.state.isFailing = true; window.render();
                        setTimeout(() => {
                            window.state.isFailing = false; window.showToast("💥 합성 실패... 카드가 모두 사라졌습니다.");
                            window.state.isProcessing = false; window.state.clickCount = 0;
                            window.saveData(); window.render();
                        }, 2000);
                    }
                }
            } catch(e) { window.state.isProcessing = false; window.render(); }
        };

                            <i class="fa-solid fa-coins"></i> 상점에 즉시 팔기 (반값)
                        </button>
                        <button onclick="window.closeCardAction()" class="w-full mt-2 bg-gray-800 text-white font-black py-4 rounded-xl active:scale-95 transition-transform">
                            닫기
                        </button>
                    </div>
                </div>
            ` : '';

            const packOverlayHtml = window.state.packOpening ? `
                <div class="absolute inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                    ${window.state.revealedCard ? `
                        <div class="${window.getCardGradeStyle(window.state.revealedCard.grade)} rounded-3xl p-8 w-full max-w-[280px] animate-pop flex flex-col items-center text-center relative overflow-hidden">
                            ${window.state.revealedCard.grade !== 'NORMAL' ? '<div class="absolute inset-0 bg-[url(\'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=\')] opacity-50 mix-blend-overlay"></div>' : ''}
                            <div class="relative z-10 w-full flex flex-col items-center">
                                <div class="mb-6">${window.getCardGradeText(window.state.revealedCard.grade)}</div>
                                ${window.state.revealedCard.imgUrl 
                                    ? `<img src="${window.state.revealedCard.imgUrl}" class="w-32 h-32 object-contain drop-shadow-xl animate-bounce mb-4" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"/> <div class="text-8xl mb-4 drop-shadow-md hidden">${window.state.revealedCard.emoji}</div>`
                                    : `<div class="text-8xl mb-4 drop-shadow-md">${window.state.revealedCard.emoji}</div>`
                                }
                                <div class="text-gray-500 font-black mb-1 bg-white/50 px-3 py-1 rounded-full text-sm">${window.state.revealedCard.kr}</div>
                                <div class="text-4xl font-black mb-8 text-gray-800 tracking-wider capitalize">${window.state.revealedCard.w}</div>
                                <div class="w-full flex gap-2 flex-col">
                                    <button onclick="window.keepCard()" class="w-full py-3.5 bg-blue-500 text-white rounded-xl font-black text-lg shadow-[0_4px_0_#1d4ed8] active:translate-y-1 active:shadow-none transition-all">도감에 넣기</button>
                                    <button onclick="window.discardCard()" class="w-full py-3 bg-red-50 text-red-500 border border-red-200 rounded-xl font-bold text-sm active:bg-red-100 transition-colors">버리기 (+10 코인)</button>
                                </div>
                            </div>
                        </div>
                    ` : `
                        <div class="booster-pack animate-pack-open mb-8">
                            <div class="booster-pack-top"></div>
                            <div class="text-white font-black text-3xl italic drop-shadow-md transform -rotate-12 mt-4">MONSTER</div>
                            <div class="text-yellow-200 font-bold text-lg tracking-widest mt-1">PACK</div>
                            <div class="booster-circle"><div class="booster-circle-top"></div><div class="booster-circle-mid"></div><div class="booster-circle-btn"></div></div>
                            <div class="booster-pack-bottom"></div>
                        </div>
                        <div class="text-white font-bold text-2xl animate-pulse">팩 뜯는 중...</div>
                    `}
                </div>
            ` : '';

            let contentHtml = '';
            if(window.state.tab === 'learning') contentHtml = window.renderLearning();
            if(window.state.tab === 'training') contentHtml = window.renderTraining();
            if(window.state.tab === 'shop') contentHtml = window.renderShop();
            if(window.state.tab === 'altar') contentHtml = window.renderAltar();
            if(window.state.tab === 'dex') contentHtml = window.renderDex();
            if(window.state.tab === 'social') contentHtml = window.renderSocial(); 

            // 🚨 안전한 로그인 이메일 파싱 🚨
            const userEmailPrefix = window.currentUser && window.currentUser.email ? window.currentUser.email.split('@')[0] : 'Guest';
            const statusLabel = window.isGuestMode ? '<span class="text-[9px] text-red-400 font-black">(오프라인 모드)</span>' : '<span class="text-[9px] text-gray-400">로그아웃</span>';

            app.innerHTML = `
                <header class="pt-safe bg-white border-b shrink-0 z-50 shadow-sm relative">
                    <div class="h-14 flex items-center justify-between px-5">
                        <button onclick="window.logout()" class="flex items-center gap-2 font-bold text-gray-800 bg-gray-50 px-2 py-1 rounded-lg active:scale-95 transition-transform border border-gray-100">
                            <div class="w-8 h-8 ${window.isGuestMode ? 'bg-red-100' : 'bg-blue-100'} rounded-full flex items-center justify-center text-lg">👦</div>
                            <div class="flex flex-col items-start">
                                <span class="text-xs ${window.isGuestMode ? 'text-red-600' : 'text-blue-600'}">${userEmailPrefix}</span>
                                ${statusLabel}
                            </div>
                        </button>
                        <div class="bg-yellow-50 px-4 py-1.5 rounded-full border border-yellow-200 font-black text-yellow-600 shadow-inner flex items-center gap-1">
                            <i class="fa-solid fa-coins"></i> ${window.state.coins}
                        </div>
                    </div>
                </header>

                ${toastHtml}
                ${packOverlayHtml}
                ${actionModalHtml}
                ${customPromptHtml}

                <main class="flex-1 overflow-y-auto overflow-x-hidden relative bg-slate-50 w-full hide-scrollbar flex flex-col" id="main-content">
                    ${contentHtml}
                </main>

                <nav class="pb-safe bg-white border-t shrink-0 z-50 relative">
                    <div class="h-16 flex items-center justify-around px-1 gap-1">
                        ${window.navButton('learning', 'fa-book-open', '학습장')}
                        ${window.navButton('training', 'fa-dumbbell', '훈련소')}
                        ${window.navButton('shop', 'fa-store', '상점')}
                        ${window.navButton('altar', 'fa-bolt', '제단')}
                        ${window.navButton('dex', 'fa-address-book', '도감')}
                        ${window.navButton('social', 'fa-globe', '소셜', 'window.changeTab(\'social\'); window.loadSocialData();')}
                    </div>
                </nav>
            `;
        };

        // =========================================================================
        // 9. 초기 구동 및 시스템 연동
        // =========================================================================
        window.startGuestMode = function(reason) {
            if (window.isGuestMode) return;
            window.isAuthReady = true; window.isGuestMode = true;
            window.currentUser = { uid: "guest", email: "Guest@offline" };
            const savedData = localStorage.getItem('phonicsAppState');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    window.state.coins = data.coins !== undefined ? data.coins : 200;
                    window.state.inventory = data.inventory || [];
                    window.state.friends = data.friends || [];
                    window.state.friendRequests = data.friendRequests || [];
                } catch(e) {}
            }
            window.changeTab('learning');
        };

        const fallbackTimer = setTimeout(() => {
            if (!window.isAuthReady) {
                window.showToast("네트워크 차단됨: 앱을 바로 엽니다!");
                window.startGuestMode("3초 무응답 타임아웃");
            }
        }, 3000); 

        try {
            if (typeof firebase === 'undefined') throw new Error("Firebase 차단됨");

            window.handleAuth = async function(isLogin) {
                const email = document.getElementById('email').value; const password = document.getElementById('password').value;
                if(!email || !password) return window.showToast('이메일과 비밀번호를 모두 입력해주세요.');
                if(password.length < 6) return window.showToast('비밀번호는 6자리 이상이어야 합니다.');
                
                window.showToast("서버와 통신 중...");
                try {
                    if (isLogin) await auth.signInWithEmailAndPassword(email, password);
                    else { await auth.createUserWithEmailAndPassword(email, password); window.showToast('가입 환영! 시작합니다. 🪙'); }
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') window.showToast('이미 가입된 이메일입니다.');
                    else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') window.showToast('이메일이나 비밀번호가 틀렸습니다.');
                    else window.showToast('오류 발생: 다시 시도해주세요.');
                }
            };

            window.logout = async function() { await auth.signOut(); window.showToast('로그아웃 되었습니다.'); };

            auth.onAuthStateChanged(async (user) => {
                if (window.isGuestMode) return; 
                clearTimeout(fallbackTimer); 
                window.isAuthReady = true;
                
                if (user) {
                    window.currentUser = user;
                    try {
                        const docRef = db.collection("users").doc(user.uid);
                        const docSnap = await docRef.get();
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            window.state.coins = data.coins !== undefined ? data.coins : 200;
                            window.state.inventory = data.inventory || [];
                            window.state.friends = data.friends || [];
                            window.state.friendRequests = data.friendRequests || [];
                        } else {
                            window.state.coins = 200; window.state.inventory = []; window.state.friends = []; window.state.friendRequests = [];
                            window.saveData();
                        }
                        window.changeTab('learning');
                    } catch(error) {
                        if(error.code === 'permission-denied') {
                            window.showToast("Firebase 규칙(Rules)이 닫혀있습니다! 콘솔에서 권한을 허용해주세요.");
                        } else {
                            window.showToast("오프라인 모드로 실행합니다.");
                        }
                        window.startGuestMode("Firestore 권한 오류");
                    }
                } else {
                    window.currentUser = null;
                    window.render();
                }
            });

        } catch(error) {
            clearTimeout(fallbackTimer);
            window.showToast("보안 환경 감지: 앱을 바로 엽니다!");
            window.startGuestMode("스크립트 차단");
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') window.render();
        else document.addEventListener('DOMContentLoaded', window.render);
    </script>
</body>
</html>
