        .animate-flash { animation: flash-red 0.5s ease-out; }
        @keyframes pack-tremble { 0%, 100% { transform: rotate(0deg) scale(1); filter: brightness(1); } 25% { transform: rotate(-5deg) scale(1.05); filter: brightness(1.2); } 50% { transform: rotate(5deg) scale(1.05); } 75% { transform: rotate(-5deg) scale(1.05); } }

        details > summary { list-style: none; outline: none; }

        .grade-legend { background: linear-gradient(135deg, #fee2e2, #fecaca, #fca5a5); border: 4px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }

    <script>
        // =========================================================================
        // 1. 단어, 알파벳, 포켓몬스터(1,025종 분류) 데이터베이스
        // =========================================================================
        const ALPHABET_DB = [
            {u:'A', l:'a', n:'에이', s:'애'}, {u:'B', l:'b', n:'비', s:'브'}, {u:'C', l:'c', n:'씨', s:'크'},
            {u:'D', l:'d', n:'디', s:'드'}, {u:'E', l:'e', n:'이', s:'에'}, {u:'F', l:'f', n:'에프', s:'프'},
            {u:'G', l:'g', n:'쥐', s:'그'}, {u:'H', l:'h', n:'에이치', s:'흐'}, {u:'I', l:'i', n:'아이', s:'이'},
            {u:'J', l:'j', n:'제이', s:'즈'}, {u:'K', l:'k', n:'케이', s:'크'}, {u:'L', l:'l', n:'엘', s:'을'},
            {u:'M', l:'m', n:'엠', s:'음'}, {u:'N', l:'n', n:'엔', s:'은'}, {u:'O', l:'o', n:'오우', s:'아'},
            {u:'P', l:'p', n:'피', s:'프'}, {u:'Q', l:'q', n:'큐', s:'쿠'}, {u:'R', l:'r', n:'알', s:'르'},
            {u:'S', l:'s', n:'에스', s:'스'}, {u:'T', l:'t', n:'티', s:'트'}, {u:'U', l:'u', n:'유', s:'어'},
            {u:'V', l:'v', n:'브이', s:'브'}, {u:'W', l:'w', n:'더블유', s:'우'}, {u:'X', l:'x', n:'엑스', s:'크스'},
            {u:'Y', l:'y', n:'와이', s:'여'}, {u:'Z', l:'z', n:'지', s:'즈'}
        ];

        const LEGEND_IDS = [144,145,146,150, 243,244,245,249,250, 377,378,379,380,381,382,383,384, 480,481,482,483,484,485,486,487,488, 638,639,640,641,642,643,644,645,646, 716,717,718, 772,773, 785,786,787,788, 789,790,791,792, 800, 888,889,890,891,892, 894,895,896,897,898, 1001,1002,1003,1004];
        const MYTHIC_IDS = [151, 251, 385,386, 489,490,491,492,493, 494, 647,648,649, 719,720,721, 801,802, 807, 808, 809, 893, 1025];
        const EXCLUDED_IDS = new Set([...LEGEND_IDS, ...MYTHIC_IDS]);
        const NORMAL_POKE_IDS = [];
        for(let i=1; i<=1025; i++) { if(!EXCLUDED_IDS.has(i)) NORMAL_POKE_IDS.push(i); }

        async function fetchPokemon(id) {
            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
                if (!res.ok) throw new Error('API Fail');
                const data = await res.json();
                const krNameObj = data.names.find(n => n.language.name === 'ko');
                const enNameObj = data.names.find(n => n.language.name === 'en');
                return {
                    w: enNameObj ? enNameObj.name : data.name, 
                    kr: krNameObj ? krNameObj.name : data.name, 
                    emoji: '✨', 
                    imgUrl: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`
                };
            } catch(e) {
                return { w: 'Pokemon', kr: '비밀의 포켓몬', emoji: '✨', imgUrl: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png` };
            }
        }

        const VOWEL_DB = {
            'a': { sound: '애', fam: [{n:'-at', w:['cat','hat','bat','mat']}, {n:'-an', w:['can','fan','man','pan']}, {n:'-ap', w:['cap','map','tap']}], magic: ['cake','game','name','lake'], var: [{rule:'ar (아)', w:['car','park','star']}] },
            'e': { sound: '에', fam: [{n:'-en', w:['pen','hen','ten']}, {n:'-et', w:['net','wet','pet']}, {n:'-ell', w:['bell','well','fell']}], magic: ['here'], var: [{rule:'단어 끝 e (이)', w:['he','me','we']}, {rule:'ee/ea (이~)', w:['see','sea','leaf']}] },
            'i': { sound: '이', fam: [{n:'-it', w:['sit','hit','bit']}, {n:'-in', w:['win','pin','bin']}, {n:'-ig', w:['pig','big','dig']}], magic: ['kite','bike','five','nine'], var: [{rule:'ir (어)', w:['bird','girl','shirt']}] },
            'o': { sound: '아', fam: [{n:'-ot', w:['hot','pot','dot']}, {n:'-op', w:['mop','top','hop']}, {n:'-og', w:['dog','log','fog']}], magic: ['hope','nose','rose','bone'], var: [{rule:'or (오)', w:['corn','horn','fork']}] },
            'u': { sound: '어', fam: [{n:'-ug', w:['bug','rug','mug']}, {n:'-ub', w:['tub','rub','cub']}, {n:'-ut', w:['nut','cut','hut']}], magic: ['cute','tube','cube','mule'], var: [{rule:'ur (어)', w:['nurse','purple','turtle']}] }
        };
        const CONSONANT_DB = {
            locations: [
                { id: 'lips', title: '💋 입술 소리', tags: '(p, b, m, w)', items: [{id: 'p', kr: '프', w: 'pig'}, {id: 'b', kr: '브', w: 'bear'}, {id: 'm', kr: '음', w: 'mouse'}, {id: 'w', kr: '우/워', w: 'water'}]},
                { id: 'teeth', title: '🦷 혀끝 소리', tags: '(t, d, n, l)', items: [{id: 't', kr: '트', w: 'tiger'}, {id: 'd', kr: '드', w: 'dog'}, {id: 'n', kr: '은', w: 'nest'}, {id: 'l', kr: '을', w: 'lion'}]},
                { id: 'throat', title: '🗣️ 목 안쪽 소리', tags: '(k, g, c, q)', items: [{id: 'k', kr: '크', w: 'kite'}, {id: 'g', kr: '그', w: 'grapes'}, {id: 'c', kr: '크', w: 'cat'}, {id: 'q', kr: '쿠', w: 'queen'}]},
                { id: 'wind', title: '🌬️ 이·바람 소리', tags: '(s, z, f, v)', items: [{id: 's', kr: '스', w: 'sun'}, {id: 'z', kr: '즈', w: 'zebra'}, {id: 'f', kr: '프', w: 'fish'}, {id: 'v', kr: '브', w: 'van'}]},
                { id: 'etc', title: '기타 소리', tags: '(h, j, r, y, x)', items: [{id: 'h', kr: '흐', w: 'house'}, {id: 'j', kr: '즈', w: 'juice'}, {id: 'r', kr: '르', w: 'rabbit'}, {id: 'y', kr: '여', w: 'yo-yo'}, {id: 'x', kr: '크스', w: 'xylophone'}]}
            ],
            vs: [
                { p1: {id: 'p', kr: '바람만(프)', sound: '프', w: 'pig'}, p2: {id: 'b', kr: '목 떨림!(브)', sound: '브', w: 'bear'} },
                { p1: {id: 't', kr: '바람만(트)', sound: '트', w: 'tiger'}, p2: {id: 'd', kr: '목 떨림!(드)', sound: '드', w: 'dog'} },
                { p1: {id: 'k', kr: '바람만(크)', sound: '크', w: 'kite'}, p2: {id: 'g', kr: '목 떨림!(그)', sound: '그', w: 'grapes'} },
                { p1: {id: 's', kr: '바람만(스)', sound: '스', w: 'sun'}, p2: {id: 'z', kr: '목 떨림!(즈)', sound: '즈', w: 'zebra'} },
                { p1: {id: 'f', kr: '바람만(프)', sound: '프', w: 'fish'}, p2: {id: 'v', kr: '목 떨림!(브)', sound: '브', w: 'van'} }
            ]
        };
        const RAW_WORDS = "cat:고양이:🐱:a,dog:개:🐶:o,pig:돼지:🐷:i,sun:태양:☀️:u,bed:침대:🛏️:e,bat:박쥐:🦇:a,hat:모자:🧢:a,map:지도:🗺️:a,cap:모자:🧢:a,fan:선풍기:🌬️:a,man:남자:👨:a,pan:팬:🍳:a,net:그물:🥅:e,red:빨강:🔴:e,leg:다리:🦵:e,pen:펜:🖊️:e,hen:암탉:🐔:e,sit:앉다:🪑:i,hit:치다:🏏:i,lip:입술:👄:i,six:육:6️⃣:i,box:상자:📦:o,fox:여우:🦊:o,top:팽이:🌀:o,hop:뛰다:🦘:o,mop:걸레:🧹:o,bug:벌레:🐛:u,rug:깔개:🔲:u,mug:머그컵:☕:u,nut:견과:🥜:u,cup:컵:🥤:u,bus:버스:🚌:u,tub:욕조:🛁:u,mud:진흙:🟤:u,web:거미줄:🕸️:e,wet:젖은:💧:e,vet:수의사:👩‍⚕️:e,zip:지퍼:🤐:i,win:이기다:🏆:i,fin:지느러미:🦈:i,bin:쓰레기통:🗑️:i,pin:핀:📍:i,mix:섞다:🥣:i,sad:슬픈:😢:a,mad:화난:😡:a,bad:나쁜:😈:a,bag:가방:👜:a,tag:태그:🏷️:a,wag:흔들다:🐕:a,jam:잼:🍓:a,ham:햄:🍖:a,ram:숫양:🐏:a,can:캔:🥫:a,van:승합차:🚐:a,run:달리다:🏃:u,fun:재미:🎉:u,gum:껌:🍬:u,hot:뜨거운:🔥:o,pot:냄비:🥘:o,dot:점:⏺️:o,log:통나무:🪵:o,jog:조깅:🏃‍♂️:o,cop:경찰:👮:o,pop:터지다:💥:o,sob:흐느끼다:😭:o,rob:도둑질:🦹:o,nod:끄덕이다:😌:o,rod:막대:🦯:o";
        const CONS_WORDS = "bear:곰:🐻:b,tiger:호랑이:🐯:t,lion:사자:🦁:l,zebra:얼룩말:🦓:z,fish:물고기:🐟:f,mouse:생쥐:🐭:m,nest:둥지:🪹:n,rabbit:토끼:🐰:r,house:집:🏠:h,juice:주스:🧃:j,kite:연:🪁:k,grapes:포도:🍇:g,queen:여왕:👑:q,water:물:💧:w";
        const WORDS_DB = [...RAW_WORDS.split(','), ...CONS_WORDS.split(',')].map(item => {
            const [w, kr, emoji, ans] = item.split(':');
            return { w, kr, emoji, ans, parts: w.split('') };
        });

        // =========================================================================
        // 2. 전역 변수 및 상태 관리
        // =========================================================================
        window.isAuthReady = false;
        window.currentUser = null;
        window.isGuestMode = false;
        window.state = {
            tab: 'learning', subTab: 'alphabet',
            trainingMode: 'alphabet', trainingSubMode: 'match',
            coins: 200, inventory: [], farmPets: [], altarSelection: [],
            toastMsg: null, currentQuiz: null, isAnswering: false, packOpening: false, revealedCard: null, animatingCorrect: null,
            altarResult: null, isFailing: false, isFailingProtected: false, isProcessing: false,
            // 🟢 광클 훈련용 상태 추가 🟢
            isClickingMode: false, clickCount: 0, clickTimeLeft: 3, clickTimer: null
        };

        window.saveData = function() {
            if (!window.currentUser || window.isGuestMode) {
                localStorage.setItem('phonicsAppState', JSON.stringify({
                    coins: window.state.coins, inventory: window.state.inventory, farmPets: window.state.farmPets
                }));
                return;
            }
            db.collection("users").doc(window.currentUser.uid).set({
                coins: window.state.coins, inventory: window.state.inventory, farmPets: window.state.farmPets
            }).catch(e => console.error("데이터 저장 실패:", e));
        };

        // =========================================================================
        // 3. TTS 음성 엔진
        // =========================================================================
        if (typeof window !== 'undefined' && window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = window.speechSynthesis.getVoices;
            }
        }

        window.speak = function(text, lang = 'en-US') {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            let speakText = text;
            if (lang === 'en-US' && speakText.length === 1 && /[a-zA-Z]/.test(speakText)) {
                speakText = speakText.toLowerCase() + ".";
            }
            const utterance = new SpeechSynthesisUtterance(speakText);
            utterance.lang = lang; utterance.rate = 0.85;

            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                let targetVoice = voices.find(v => v.lang === lang || v.lang === lang.replace('-', '_'));
                if (!targetVoice) targetVoice = voices.find(v => v.lang.startsWith(lang.substring(0, 2)));
                if (targetVoice) utterance.voice = targetVoice;
            }
            window.speechSynthesis.speak(utterance);
        };

        window.showToast = function(msg) {
            window.state.toastMsg = msg; window.render();
            setTimeout(() => { window.state.toastMsg = null; window.render(); }, 2000);
        };

        // =========================================================================
        // 4. 훈련소 출제 로직
        // =========================================================================
        window.setLearningSubTab = function(sub) { window.state.subTab = sub; window.render(); };
        window.setTrainingMode = function(mode) {
            window.state.trainingMode = mode;
            if (mode === 'alphabet' && !window.state.trainingSubMode) window.state.trainingSubMode = 'match';
            window.state.isAnswering = false; window.state.animatingCorrect = null;
            window.getNewQuiz(); window.render();
        };
        window.setTrainingSubMode = function(subMode) {
            window.state.trainingSubMode = subMode;
            window.state.isAnswering = false; window.state.animatingCorrect = null;
            window.getNewQuiz(); window.render();
        };

        window.getNewQuiz = function() {
            const mode = window.state.trainingMode || 'alphabet';
            
            if (mode === 'alphabet') {
                const qType = window.state.trainingSubMode || 'match';
                const target = ALPHABET_DB[Math.floor(Math.random() * ALPHABET_DB.length)];
                let options = [], ans = '';

                if (qType === 'match') {
                    const isUpperToLower = Math.random() > 0.5;
                    ans = isUpperToLower ? target.l : target.u;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'match',
                        display: isUpperToLower ? target.u : target.l,
                        sub: isUpperToLower ? '소문자 짝꿍은?' : '대문자 짝꿍은?',
                        ans: ans, speakText: target.l, speakLang: 'en-US'
                    };
                    options = ALPHABET_DB.map(x => isUpperToLower ? x.l : x.u);
                } else if (qType === 'name') {
                    ans = target.u;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'name', display: `🔈 ${target.n}`, sub: '이름을 가진 알파벳은?',
                        ans: ans, speakText: target.l, speakLang: 'en-US'
                    };
                    options = ALPHABET_DB.map(x => x.u);
                } else if (qType === 'sound') {
                    ans = target.l;
                    window.state.currentQuiz = {
                        isAlphabet: true, qType: 'sound', display: `🔈 ${target.s}`, sub: '소리를 내는 알파벳은?',
                        ans: ans, speakText: target.s, speakLang: 'ko-KR'
                    };
                    options = ALPHABET_DB.map(x => x.l);
                }

                options = options.filter(x => x !== ans).sort(() => 0.5 - Math.random()).slice(0, 4);
                options.push(ans);
                window.state.currentQuiz.options = options.sort(() => 0.5 - Math.random());
            } 
            else {
                let wordObj, targetAns, blankIdx, opts = [];
                if (mode === 'vowel') {
                    const vowelWords = WORDS_DB.filter(w => ['a','e','i','o','u'].includes(w.ans) && w.parts.includes(w.ans));
                    wordObj = vowelWords[Math.floor(Math.random() * vowelWords.length)];
                    targetAns = wordObj.ans; blankIdx = wordObj.parts.indexOf(targetAns);
                    opts = ['a', 'e', 'i', 'o', 'u'];
                } else {
                    wordObj = WORDS_DB[Math.floor(Math.random() * WORDS_DB.length)];
                    blankIdx = Math.floor(Math.random() * wordObj.parts.length);
                    targetAns = wordObj.parts[blankIdx];
                    opts = [targetAns];
                    const isVowel = ['a','e','i','o','u'].includes(targetAns);
                    const pool = isVowel ? ['a','e','i','o','u'] : ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','x','y','z'];
                    while(opts.length < 5) {
                        const rnd = pool[Math.floor(Math.random() * pool.length)];
                        if(!opts.includes(rnd)) opts.push(rnd);
                    }
                }
                opts.sort(() => 0.5 - Math.random());
                window.state.currentQuiz = { ...wordObj, isAlphabet: false, ans: targetAns, blankIndex: blankIdx, options: opts };
            }
        };

        window.checkAnswer = function(selected) {
            if(window.state.isAnswering) return;
            window.state.isAnswering = true;
            const q = window.state.currentQuiz;
            const isCorrect = selected === q.ans;
            const mainContent = document.getElementById('main-content'); 

            if(isCorrect) {
                window.state.coins += 20; window.saveData(); 
                if(q.isAlphabet) window.speak(q.ans.toLowerCase(), 'en-US'); else window.speak(q.w, 'en-US');
                window.state.animatingCorrect = selected; window.render();
                
                setTimeout(() => {
                    window.showToast("🎉 정답! +20 코인"); window.state.animatingCorrect = null;
                    window.state.isAnswering = false; window.getNewQuiz(); window.render();
                }, 700);
            } else {
                window.state.coins = Math.max(0, window.state.coins - 10); window.saveData(); 
                if (q.isAlphabet) window.speak(selected.toLowerCase(), 'en-US');
                else {
                    let soundKr = selected;
                    if (VOWEL_DB[selected]) soundKr = VOWEL_DB[selected].sound;
                    else { const found = CONSONANT_DB.locations.flatMap(l=>l.items).find(c => c.id === selected); if(found) soundKr = found.kr; }
                    window.speak(soundKr, 'ko-KR');
                }

                if(mainContent) mainContent.classList.add('animate-shake', 'animate-flash');
                const btn = document.getElementById(`opt-${selected}`);
                if(btn) btn.classList.replace('bg-blue-500', 'bg-red-500');
                window.showToast("앗! -10 코인");

                setTimeout(() => {
                    if(mainContent) mainContent.classList.remove('animate-shake', 'animate-flash');
                    if(btn) btn.classList.replace('bg-red-500', 'bg-blue-500');
                    window.state.isAnswering = false; window.render();
                }, 500);
            }
        };

        // =========================================================================

            if (grade === 'LEGEND') return '<span class="bg-gradient-to-r from-red-500 to-rose-400 text-white px-3 py-1 rounded-full text-xs font-black shadow-md">💎 SS급 전설</span>';

        window.openPack = async function() {
            if(window.state.coins < 50) return window.showToast("코인이 부족해요! (50 필요)");
            if(window.state.packOpening || window.state.isProcessing) return;
            
            window.state.isProcessing = true;
            window.state.coins -= 50; window.saveData(); 
            window.state.packOpening = true; window.render();
            
            const rand = Math.random(); let grade = 'NORMAL'; let drawnCard = {};
            
            if (rand < 0.03) grade = 'SUPER'; 
            else if (rand < 0.20) grade = 'RARE';

            if (grade === 'SUPER') {
                const randomId = NORMAL_POKE_IDS[Math.floor(Math.random() * NORMAL_POKE_IDS.length)];
                drawnCard = await fetchPokemon(randomId);
            } else {
                drawnCard = WORDS_DB[Math.floor(Math.random() * WORDS_DB.length)];
            }

            setTimeout(() => {
                window.state.revealedCard = { id: Date.now().toString(), ...drawnCard, grade: grade };
                window.state.isProcessing = false;
                window.render(); window.speak(drawnCard.w);
            }, 800);
        };
        
        window.keepCard = function() {
            window.state.inventory.push(window.state.revealedCard);
            if(window.state.farmPets.length < 15) { window.state.farmPets.push({...window.state.revealedCard, x: Math.random()*80, y: Math.random()*80}); }
            window.state.packOpening = false; window.state.revealedCard = null; window.saveData(); window.showToast("도감에 보관했어요! 🎒"); window.render();
        };
        
        window.discardCard = function() {
            window.state.coins += 10; window.state.packOpening = false; window.state.revealedCard = null;
            window.saveData(); window.showToast("카드를 버리고 10 코인을 얻었어요! 🪙"); window.render();
        };

        window.sellCard = function(id) {
            const card = window.state.inventory.find(c => c.id === id);
            if (!card) return;
            const prices = { 'NORMAL': 10, 'RARE': 25, 'SUPER': 100, 'LEGEND': 500, 'MYTHIC': 2000 };
            const price = prices[card.grade] || 10;

            if (confirm(`'${card.kr}' 카드를 ${price}코인에 판매하시겠습니까?`)) {
                window.state.inventory = window.state.inventory.filter(c => c.id !== id);
                window.state.farmPets = window.state.farmPets.filter(p => p.id !== id);
                window.state.coins += price;
                window.saveData();
                window.showToast(`카드를 판매하고 ${price}코인을 얻었습니다! 🪙`);
                window.render();
            }
        };

        window.selectForAltar = function(id) {
            if(window.state.altarSelection.includes(id)) { window.state.altarSelection = window.state.altarSelection.filter(x => x !== id); } 
            else {
                if(window.state.altarSelection.length >= 2) return window.showToast("2개까지만 선택 가능해요!");
                const card = window.state.inventory.find(c => c.id === id);
                if(window.state.altarSelection.length === 1) {
                    const firstCard = window.state.inventory.find(c => c.id === window.state.altarSelection[0]);
                    if(firstCard.grade !== card.grade) return window.showToast("같은 등급의 카드만 합성할 수 있어요!");
                }
                window.state.altarSelection.push(id);
            }
            window.render();
        };
        
        // 🟢 3초 광클(터치) 이벤트 시작 함수 🟢
        window.startClickEvent = function() {
            if(window.state.altarSelection.length !== 2 || window.state.isProcessing) return;
            
            window.state.isClickingMode = true;
            window.state.clickCount = 0;
            window.state.clickTimeLeft = 3; 
            window.render();

            window.state.clickTimer = setInterval(() => {
                window.state.clickTimeLeft -= 1;
                
                if(window.state.clickTimeLeft <= 0) {
                    clearInterval(window.state.clickTimer);
                    window.state.isClickingMode = false;
                    window.tryEvolve(); // 3초 끝나면 바로 진화 확률 계산 시작
                } else {
                    window.render();
                }
            }, 1000);
        };

        // 🟢 터치 횟수 증가 및 실시간 성공률 상승 함수 🟢
        window.doClick = function() {
            if(!window.state.isClickingMode) return;
            window.state.clickCount += 1;
            
            const btn = document.getElementById('click-btn');
            if(btn) {
                btn.classList.remove('animate-pump');
                void btn.offsetWidth; // 리플로우 강제 트리거
                btn.classList.add('animate-pump');
            }
            window.render();
        };

        // 🟢 진화 성공 계산 로직 🟢
        window.tryEvolve = async function() {
            window.state.isProcessing = true;

            const cardId = window.state.altarSelection[0];
            const baseCard = window.state.inventory.find(c => c.id === cardId);
            const grade = baseCard.grade;

            // 🚨 기본 진화 성공률
            let baseRate = 0.60; 
            let nextGrade = 'SUPER';
            let pokeIdList = NORMAL_POKE_IDS;

            if (grade === 'SUPER') { baseRate = 0.30; nextGrade = 'LEGEND'; pokeIdList = LEGEND_IDS; }
            if (grade === 'LEGEND') { baseRate = 0.20; nextGrade = 'MYTHIC'; pokeIdList = MYTHIC_IDS; }

            // 🟢 광클 부스트: 1클릭 당 +1.5% 상승, 11번 터치 시 카드 파괴 방지!
            const targetClicks = 11;
            const isProtected = window.state.clickCount >= targetClicks;
            const addedRate = window.state.clickCount * 0.015;
            const finalRate = Math.min(baseRate + addedRate, 1.0);

            if(Math.random() < finalRate) { 
                // 진화 대성공! (기존 카드 소멸 및 새 카드 지급)
                window.state.inventory = window.state.inventory.filter(c => !window.state.altarSelection.includes(c.id));
                window.state.altarSelection = [];
                
                const randomId = pokeIdList[Math.floor(Math.random() * pokeIdList.length)];
                const poke = await fetchPokemon(randomId);
                const newCard = { id: Date.now().toString(), grade: nextGrade, ...poke };
                
                window.state.revealedCard = newCard;
                window.state.packOpening = true; 
                window.showToast(`✨ 합성 대성공! (확률 ${Math.floor(finalRate*100)}% 적용)`);
                window.speak(poke.w);
                
                window.state.isProcessing = false;
                window.state.clickCount = 0; 
                window.saveData(); window.render();
            } else {
                // 진화 실패
                if (isProtected) {
                    // 🛡️ 카드 파괴 방지 발동! (카드는 사라지지 않습니다)
                    window.state.altarSelection = []; 
                    window.state.isFailingProtected = true;
                    window.render();
                    setTimeout(() => {
                        window.state.isFailingProtected = false;
                        window.showToast("휴~ 🛡️ 엄청난 터치 덕분에 카드를 지켜냈어요!");
                        window.state.isProcessing = false;
                        window.state.clickCount = 0;
                        window.saveData(); window.render();
                    }, 2500);
                } else {
                    // 💥 카드 완전히 파괴됨
                    window.state.inventory = window.state.inventory.filter(c => !window.state.altarSelection.includes(c.id));
                    window.state.altarSelection = [];
                    window.state.isFailing = true;
                    window.render();
                    setTimeout(() => {
                        window.state.isFailing = false;
                        window.showToast("💥 합성 실패... 카드가 모두 사라졌습니다.");
                        window.state.isProcessing = false;
                        window.state.clickCount = 0;
                        window.saveData(); window.render();
                    }, 2000);
                }
            }
        };

                            <input type="password" id="password" placeholder="비밀번호 (6자 이상)" class="w-full bg-gray-100 px-4 py-3 rounded-xl font-bold text-gray-800 outline-none focus:ring-2 focus:ring-blue-400 mb-2">
                            <button onclick="window.handleAuth(true)" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-1 active:shadow-none transition-all">로그인</button>
                            <button onclick="window.handleAuth(false)" class="w-full bg-white text-blue-600 border-2 border-blue-200 font-black py-4 rounded-xl active:bg-blue-50 transition-all mt-2">새 계정 만들기</button>
                        </div>
                    </div>
                `;
                return;
            }

            const toastHtml = window.state.toastMsg ? `<div class="absolute top-20 left-1/2 -translate-x-1/2 z-[100] bg-gray-800 text-white px-6 py-3 rounded-full font-bold text-sm shadow-2xl animate-pop whitespace-nowrap">${window.state.toastMsg}</div>` : '';

            const packOverlayHtml = window.state.packOpening ? `
                <div class="absolute inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-sm">
                    ${window.state.revealedCard ? `
                        <div class="${window.getCardGradeStyle(window.state.revealedCard.grade)} rounded-3xl p-8 w-full max-w-[280px] animate-pop flex flex-col items-center text-center relative overflow-hidden">
                            ${window.state.revealedCard.grade !== 'NORMAL' ? '<div class="absolute inset-0 bg-[url(\'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSIvPgo8L3N2Zz4=\')] opacity-50 mix-blend-overlay"></div>' : ''}
                            <div class="relative z-10 w-full flex flex-col items-center">
                                <div class="mb-6">${window.getCardGradeText(window.state.revealedCard.grade)}</div>
                                ${window.state.revealedCard.imgUrl 
                                    ? `<img src="${window.state.revealedCard.imgUrl}" class="w-32 h-32 object-contain drop-shadow-xl animate-bounce mb-4" onerror="this.style.display='none';this.nextElementSibling.style.display='block';"/> <div class="text-8xl mb-4 drop-shadow-md hidden">${window.state.revealedCard.emoji}</div>`
                                    : `<div class="text-8xl mb-4 drop-shadow-md">${window.state.revealedCard.emoji}</div>`
                                }
                                <div class="text-gray-500 font-black mb-1 bg-white/50 px-3 py-1 rounded-full text-sm">${window.state.revealedCard.kr}</div>
                                <div class="text-4xl font-black mb-8 text-gray-800 tracking-wider capitalize">${window.state.revealedCard.w}</div>
                                <div class="w-full flex gap-2 flex-col">
                                    <button onclick="window.keepCard()" class="w-full py-3.5 bg-blue-500 text-white rounded-xl font-black text-lg shadow-[0_4px_0_#1d4ed8] active:translate-y-1 active:shadow-none transition-all">도감에 넣기</button>
                                    <button onclick="window.discardCard()" class="w-full py-3 bg-red-50 text-red-500 border border-red-200 rounded-xl font-bold text-sm active:bg-red-100 transition-colors">버리기 (+10 코인)</button>
                                </div>
                            </div>
                        </div>
                    ` : `<div class="text-9xl animate-pack-open filter drop-shadow-2xl mb-8">📦</div><div class="text-white font-bold text-2xl animate-pulse">카드를 뽑는 중...</div>`}
                </div>
            ` : '';

            let contentHtml = '';
            if(window.state.tab === 'learning') contentHtml = window.renderLearning();
            if(window.state.tab === 'training') contentHtml = window.renderTraining();
            if(window.state.tab === 'shop') contentHtml = window.renderShop();
            if(window.state.tab === 'altar') contentHtml = window.renderAltar();
            if(window.state.tab === 'dex') contentHtml = window.renderDex();
            if(window.state.tab === 'farm') contentHtml = window.renderFarm();

            const userEmailPrefix = window.currentUser && window.currentUser.email ? window.currentUser.email.split('@')[0] : 'Guest';
            const statusLabel = window.isGuestMode ? '<span class="text-[9px] text-red-400 font-black">(오프라인 모드)</span>' : '<span class="text-[9px] text-gray-400">로그아웃</span>';

            app.innerHTML = `
                <header class="pt-safe bg-white border-b shrink-0 z-50 shadow-sm relative">
                    <div class="h-14 flex items-center justify-between px-5">
                        <button onclick="window.logout()" class="flex items-center gap-2 font-bold text-gray-800 bg-gray-50 px-2 py-1 rounded-lg active:scale-95 transition-transform border border-gray-100">
                            <div class="w-8 h-8 ${window.isGuestMode ? 'bg-red-100' : 'bg-blue-100'} rounded-full flex items-center justify-center text-lg">👦</div>
                            <div class="flex flex-col items-start">
                                <span class="text-xs ${window.isGuestMode ? 'text-red-600' : 'text-blue-600'}">${userEmailPrefix}</span>
                                ${statusLabel}
                            </div>
                        </button>
                        <div class="bg-yellow-50 px-4 py-1.5 rounded-full border border-yellow-200 font-black text-yellow-600 shadow-inner flex items-center gap-1">
                            <i class="fa-solid fa-coins"></i> ${window.state.coins}
                        </div>
                    </div>
                </header>
                ${toastHtml}
                ${packOverlayHtml}
                <main class="flex-1 overflow-y-auto overflow-x-hidden relative bg-slate-50 w-full hide-scrollbar flex flex-col" id="main-content">
                    ${contentHtml}
                </main>
                <nav class="pb-safe bg-white border-t shrink-0 z-50 relative">
                    <div class="h-16 flex items-center justify-between px-1">
                        <button onclick="window.changeTab('learning')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'learning' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'learning' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-book-open"></i></div><span class="text-[9px] font-bold">학습장</span></button>
                        <button onclick="window.changeTab('training')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'training' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'training' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-dumbbell"></i></div><span class="text-[9px] font-bold">훈련소</span></button>
                        <button onclick="window.changeTab('shop')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'shop' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'shop' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-store"></i></div><span class="text-[9px] font-bold">상점</span></button>
                        <button onclick="window.changeTab('altar')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'altar' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'altar' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-bolt"></i></div><span class="text-[9px] font-bold">제단</span></button>
                        <button onclick="window.changeTab('dex')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'dex' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'dex' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-address-book"></i></div><span class="text-[9px] font-bold">도감</span></button>
                        <button onclick="window.changeTab('farm')" class="flex-1 flex flex-col items-center justify-center gap-1 py-1 transition-all ${window.state.tab === 'farm' ? 'text-blue-600 scale-110' : 'text-gray-400'}"><div class="${window.state.tab === 'farm' ? 'bg-blue-100' : ''} w-9 h-9 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-tree"></i></div><span class="text-[9px] font-bold">농장</span></button>
                    </div>
                </nav>
            `;
        };

        window.addEventListener('load', () => {
            try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
        });

        window.startGuestMode = function(reason) {
            if (window.isGuestMode) return;
            window.isAuthReady = true; window.isGuestMode = true;
            window.currentUser = { uid: "guest", email: "Guest@offline" };
            const savedData = localStorage.getItem('phonicsAppState');
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    window.state.coins = data.coins !== undefined ? data.coins : 200;
                    window.state.inventory = data.inventory || [];
                    window.state.farmPets = data.farmPets || [];
                } catch(e) {}
            }
            window.changeTab('learning');
        };

        const fallbackTimer = setTimeout(() => {
            if (!window.isAuthReady) {
                window.showToast("네트워크 차단됨: 앱을 바로 엽니다!");
                window.startGuestMode("3초 무응답 타임아웃");
            }
        }, 3000); 

        try {
            if (typeof firebase === 'undefined') throw new Error("Firebase 차단됨");

            // 🚨🚨🚨 [매우 중요] 🚨🚨🚨 아래 firebaseConfig를 선생님의 것으로 꼭 교체해주세요!
            const firebaseConfig = {
                apiKey: "AIzaSyBC5ffBjfAuLmq_Dg-J9XFOp6y7lzdhHYI",
                authDomain: "phonicsmonster-2d495.firebaseapp.com",
                projectId: "phonicsmonster-2d495",
                storageBucket: "phonicsmonster-2d495.firebasestorage.app",
                messagingSenderId: "961679319312",
                appId: "1:961679319312:web:8eb58f35e963585bab8595",
                measurementId: "G-RFDMSR7G82"
            };

            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            window.saveData = function() {
                if (!window.currentUser || window.isGuestMode) {
                    localStorage.setItem('phonicsAppState', JSON.stringify({ coins: window.state.coins, inventory: window.state.inventory, farmPets: window.state.farmPets })); return;
                }
                db.collection("users").doc(window.currentUser.uid).set({ coins: window.state.coins, inventory: window.state.inventory, farmPets: window.state.farmPets }).catch(e => {});
            };

            window.handleAuth = async function(isLogin) {
                const email = document.getElementById('email').value; const password = document.getElementById('password').value;
                if(!email || !password) return window.showToast('이메일과 비밀번호를 모두 입력해주세요.');
                if(password.length < 6) return window.showToast('비밀번호는 6자리 이상이어야 합니다.');
                
                window.showToast("서버와 통신 중...");
                try {
                    if (isLogin) await auth.signInWithEmailAndPassword(email, password);
                    else { await auth.createUserWithEmailAndPassword(email, password); window.showToast('가입 환영! 시작합니다. 🪙'); }
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') window.showToast('이미 가입된 이메일입니다.');
                    else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') window.showToast('이메일이나 비밀번호가 틀렸습니다.');
                    else window.showToast('오류 발생: 다시 시도해주세요.');
                }
            };

            window.logout = async function() { await auth.signOut(); window.showToast('로그아웃 되었습니다.'); };

            auth.onAuthStateChanged(async (user) => {
                if (window.isGuestMode) return; 
                clearTimeout(fallbackTimer); 
                window.isAuthReady = true;
                
                if (user) {
                    window.currentUser = user;
                    try {
                        const docRef = db.collection("users").doc(user.uid);
                        const docSnap = await docRef.get();
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            window.state.coins = data.coins !== undefined ? data.coins : 200;
                            window.state.inventory = data.inventory || [];
                            window.state.farmPets = data.farmPets || [];
                        } else {
                            window.state.coins = 200; window.state.inventory = []; window.state.farmPets = [];
                            window.saveData();
                        }
                        window.changeTab('learning');
                    } catch(error) {
                        console.error("DB 거부 에러:", error);
                        window.showToast("⚠️ Firebase 정보가 다르거나 규칙이 닫혀있습니다.");
                        window.startGuestMode("Firestore 권한 오류");
                    }
                } else {
                    window.currentUser = null;
                    window.render();
                }
            });

        } catch(error) {
            console.error("Firebase 로딩 실패:", error);
            clearTimeout(fallbackTimer);
            window.showToast("보안 환경 감지: 앱을 바로 엽니다!");
            window.startGuestMode("스크립트 차단");
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') window.render();
        else document.addEventListener('DOMContentLoaded', window.render);
    </script>
</body>
</html>
